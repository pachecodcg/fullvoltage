<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Full Voltage / ADEA LI Interview Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
input,button,[contenteditable]{-webkit-appearance:none;-moz-appearance:none}
:root{--teal:#197589;--green:#588234;--orange:#f59c36;--bg:#f2f4f5;--surface:#fff;--surface2:#f0f2f4;--border:#d4d9dd;--text:#1a2a30;--text2:#526068;--text3:#8a949a;--accent-soft:rgba(25,117,137,.07);--accent-med:rgba(25,117,137,.14);--green-soft:rgba(88,130,52,.08);--green-med:rgba(88,130,52,.16);--orange-soft:rgba(245,156,54,.08);--orange-med:rgba(245,156,54,.18);--red:#c0392b;--red-soft:rgba(192,57,43,.07);--r:8px;--r2:10px;--sh:0 1px 2px rgba(0,0,0,.05);--sh2:0 3px 10px rgba(0,0,0,.07)}
body{font-family:'Nunito Sans',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;-moz-text-size-adjust:100%}
.app{max-width:1360px;margin:0 auto;padding:20px 24px 40px}

/* ── Header ── */
.hdr{background:linear-gradient(135deg,#14626e,var(--teal) 50%,#1a8a9e);color:#fff;border-radius:var(--r2);padding:20px 28px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;box-shadow:var(--sh2)}
.hdr-l{display:flex;align-items:center;gap:18px}
.am .wm{font-size:10px;letter-spacing:4.5px;font-weight:700;opacity:.6}
.am .tg{font-size:8px;letter-spacing:1.8px;opacity:.4;margin-top:2px}
.hdiv{width:1px;height:48px;background:rgba(255,255,255,.18)}
.ht{display:flex;align-items:center;gap:10px}
.ht h1{font-size:30px;font-weight:800;letter-spacing:2px;text-shadow:0 1px 4px rgba(0,0,0,.12)}
.ht-sub{font-size:11px;opacity:.6;margin-top:3px;font-weight:400}
.he{background:transparent;border:none;border-bottom:1px solid transparent;color:#fff;font-family:inherit;outline:none;padding:0 2px}
.he:focus{border-bottom-color:rgba(255,255,255,.4)}
.he::placeholder{color:rgba(255,255,255,.3)}
h1 .he{font-size:30px;font-weight:800;letter-spacing:2px;text-shadow:0 1px 4px rgba(0,0,0,.12);width:100%!important;max-width:500px}
.ht-sub .he{font-size:11px;opacity:.85}
.hdr-r{display:flex;gap:8px;flex-wrap:wrap}
.ch{padding:5px 12px;border-radius:14px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:5px;letter-spacing:.3px}
.ch::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.ch.u{background:rgba(255,255,255,.12);color:#ffcaca}
.ch.i{background:rgba(255,255,255,.12);color:#c8e8ff}

/* ── People Cards ── */
.people{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.p-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:.15s;position:relative;min-height:0}
.p-card:hover{border-color:var(--teal);box-shadow:var(--sh)}
.p-card.open{border-color:var(--teal)}
.p-card.mentor{background:linear-gradient(135deg,rgba(245,156,54,.05),rgba(245,156,54,.01));border-color:rgba(245,156,54,.3)}
.p-card.mentor:hover,.p-card.mentor.open{border-color:var(--orange)}
.p-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px;display:flex;align-items:center}
.p-card.mentor .p-label{color:var(--orange)}
.p-toggle{font-size:8px;font-weight:500;color:var(--teal);margin-left:auto;opacity:.6}
.p-card:hover .p-toggle{opacity:1}
.p-card.mentor .p-toggle{color:var(--orange)}
.p-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;outline:none;border-radius:2px}
.p-name:focus{background:var(--accent-soft)}
.p-inst{font-size:9.5px;color:var(--text2);margin-top:1px;line-height:1.3;outline:none;border-radius:2px}
.p-inst:focus{background:var(--accent-soft)}
.p-detail{margin-top:8px;padding-top:6px;border-top:1px solid var(--surface2);display:none}
.p-card.open .p-detail{display:block}
.p-card.mentor.open .p-detail{border-top-color:rgba(245,156,54,.12)}
.pf-label{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-top:5px}
.pf-label:first-child{margin-top:0}
.pf{display:block;width:100%;border:none;border-bottom:1px solid transparent;background:transparent;font-family:inherit;font-size:10px;color:var(--text);outline:none;padding:2px 0}
.pf:focus{border-bottom-color:var(--teal);background:var(--accent-soft)}
.p-card.mentor .pf:focus{border-bottom-color:var(--orange);background:var(--orange-soft)}
.pf::placeholder{color:var(--text3);font-style:italic;font-size:9px}
.pf.email{color:var(--teal);font-weight:600}
.p-card.mentor .pf.email{color:#c07a10}
.p-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;opacity:0;line-height:1;transition:.15s;padding:0 2px}
.p-card:hover .p-remove{opacity:.35}
.p-remove:hover{opacity:1!important;color:var(--red)}
.add-card{background:transparent;border:1px solid var(--border);border-radius:var(--r);color:var(--text3);cursor:pointer;font-size:9px;font-weight:600;text-align:center;display:flex;align-items:center;justify-content:center;transition:.15s;opacity:.4}
.add-card:hover{border-color:var(--teal);color:var(--teal);opacity:.8}

/* ── Tabs ── */
.tabs{display:flex;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.tab{flex:1;padding:10px 14px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text3);transition:.15s;border:none;background:none;text-align:center;border-right:1px solid var(--border);position:relative}
.tab:last-child{border-right:none}
.tab:hover{color:var(--text);background:var(--surface2)}
.tab.active{color:#fff;background:var(--teal)}
.tab.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:32px;height:2.5px;background:var(--orange);border-radius:2px 2px 0 0}
.pn{display:none}.pn.active{display:block}

/* ── Shared ── */
.sd{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.5;padding:8px 12px;background:var(--accent-soft);border-left:2.5px solid var(--teal);border-radius:0 5px 5px 0}
.lg{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:9.5px;font-weight:600;color:var(--text3)}
.ldd{width:7px;height:7px;border-radius:50%}
.inst-key{font-size:9.5px;color:var(--text3);margin-bottom:8px;line-height:1.6}
.inst-key strong{color:var(--text2);font-weight:700}
.sst{font-size:13px;font-weight:800;color:var(--teal);margin:14px 0 6px;padding:5px 0;border-bottom:2px solid var(--teal)}

/* ── Table ── */
.sw{overflow-x:auto;margin-bottom:14px;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border)}
table.st{width:100%;border-collapse:collapse;background:var(--surface);table-layout:fixed}
table.st col.pos{width:125px}table.st col.inst{width:auto}
table.st th{background:var(--teal);color:#fff;padding:8px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;vertical-align:middle}
table.st td{padding:8px 10px;font-size:11px;border-bottom:1px solid var(--border);vertical-align:top;word-wrap:break-word;line-height:1.4}
table.st .num-cell{font-weight:700;color:var(--teal);text-align:center;font-size:10px;width:28px;vertical-align:top;padding-top:10px}
table.st tr:nth-child(even) td{background:var(--surface2)}
table.st tr:hover td{background:var(--accent-soft)}
table.st [contenteditable]{cursor:text;outline:none;border-radius:2px;padding:1px 2px}
table.st [contenteditable]:focus{background:var(--accent-soft)!important}
.sp{font-weight:700;color:var(--teal);font-size:11px;outline:none;border-radius:2px;line-height:1.4;padding-top:1px}
.sp:focus{background:var(--accent-soft)}
.sn{font-weight:700;color:var(--text);display:block;margin-bottom:1px;line-height:1.4}
.tt{font-size:10px;color:var(--text2);display:block;line-height:1.3}
.ss{display:inline-block;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:700;cursor:pointer;margin-top:4px;text-transform:uppercase;letter-spacing:.4px}
.ss.confirmed{background:var(--green-med);color:var(--green)}
.ss.pending{background:var(--orange-med);color:#b87a1a}
.ss.tbd{background:var(--red-soft);color:var(--red)}
.add-stk{background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;font-weight:600;opacity:.5;transition:.15s;font-family:inherit}
.add-stk:hover{color:var(--teal);opacity:1}

/* ── Questions ── */
.qrs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.qrb{padding:6px 14px;border-radius:16px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:.15s}
.qrb:hover{border-color:var(--teal);color:var(--teal)}
.qrb.a{background:var(--teal);color:#fff;border-color:var(--teal)}
.qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:8px;box-shadow:var(--sh)}
.qc:hover{border-color:var(--teal)}
.qn{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.qn.core{background:var(--accent-med);color:var(--teal)}
.qn.spec{background:var(--green-soft);color:var(--green)}
.qt{flex:1;font-size:12px;line-height:1.5;outline:none;padding:1px 3px;border-radius:2px}
.qt:focus{background:var(--accent-soft);color:var(--teal)}
.qtg{font-size:8px;padding:2px 7px;border-radius:6px;font-weight:700;flex-shrink:0;text-transform:uppercase;letter-spacing:.4px}
.qtg.core{background:var(--accent-soft);color:var(--teal)}
.qtg.spec{background:var(--green-soft);color:var(--green)}
.qa{display:flex;gap:2px;flex-shrink:0}
.qb{width:24px;height:24px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.qb:hover{background:var(--surface2);color:var(--text);border-color:var(--teal)}
.qb.del:hover{background:var(--red-soft);color:var(--red);border-color:var(--red)}
.aq{width:100%;padding:9px;border:1.5px dashed var(--border);border-radius:var(--r);background:none;color:var(--text3);cursor:pointer;font-size:11px;font-weight:600;margin-top:4px}
.aq:hover{border-color:var(--teal);color:var(--teal);background:var(--accent-soft)}

/* ── Roles ── */
.rc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:8px;box-shadow:var(--sh)}
.rc h3{font-size:13px;font-weight:800;color:var(--teal);margin-bottom:2px}
.rc p{font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.45}
.ra{display:flex;gap:5px;flex-wrap:wrap}
.fc-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.fc{padding:5px 12px;border-radius:16px;border:1.5px solid var(--border);font-size:10px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text2)}
.fc:hover{border-color:var(--teal);color:var(--teal)}
.fc.sel{background:var(--teal);color:#fff;border-color:var(--teal)}
.role-input{padding:4px 8px;border:1.5px solid var(--border);border-radius:4px;font-size:10px;font-family:inherit;outline:none;width:180px}
.role-input:focus{border-color:var(--teal)}

/* ── Timeline ── */
.ti{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.tc{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;margin-top:1px}
.tc:hover{border-color:var(--teal)}
.tc.done{background:var(--green);border-color:var(--green);color:#fff}
.tdd{min-width:110px;font-size:11px;font-weight:800;color:var(--teal)}
.tk{font-size:12px;color:var(--text2);line-height:1.45}
.tk strong{color:var(--text);font-weight:700}

/* ── Footer ── */
.foot{margin-top:24px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.foot p{font-size:11px;color:var(--text3);flex:1;min-width:180px}
.submit-btn{background:var(--teal);color:#fff;border:none;padding:9px 22px;border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.submit-btn:hover{background:#14626e}
.reset-btn{background:none;border:1px solid var(--border);color:var(--text3);padding:9px 16px;border-radius:var(--r);font-size:10px;cursor:pointer;flex-shrink:0}
.reset-btn:hover{border-color:var(--red);color:var(--red)}

@media(max-width:1100px){.people{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.people{grid-template-columns:repeat(2,1fr)}.hdr{padding:18px 20px}h1 .he{font-size:24px}}
@media(max-width:600px){
.app{padding:10px 12px}.hdr{padding:14px 16px;gap:10px}.hdiv{display:none}
h1 .he{font-size:20px}.ht-sub{font-size:10px}.hdr-r{gap:5px}
.ch{font-size:9px;padding:4px 10px}
.people{grid-template-columns:1fr 1fr;gap:6px}
.tab{padding:10px 6px;font-size:10px}
.qc{padding:8px 10px;gap:6px}.qt{font-size:11px}
.foot{flex-direction:column;gap:8px;padding:14px}
}
@media(max-width:400px){.people{grid-template-columns:1fr}}
</style>
</head>

{d:'June 19, 2026',t:'Read Reframing Academic Leadership: Parts 1 through 3',x:false},
{d:'Phase I',t:'Discuss findings with peer group; plan Summary of Findings',x:false},
{d:'July 10, 2026',t:'Submit Summary of Findings to Dr. Tucker-Lively (5 to 8 pages, 2000 to 3000 words)',x:false}
]))}

let D;function sv(){try{localStorage.setItem(SK,JSON.stringify(D))}catch(e){}}
function ld(){try{const x=localStorage.getItem(SK);if(x)D=JSON.parse(x)}catch(e){}}
ld();if(!D)D=defaultData();
let OC={};

function render(){
  const m=D.mentor;
  let h=`<div class="hdr"><div class="hdr-l">
<div class="am"><div class="wm">ADEA</div><div class="tg">THE VOICE OF DENTAL EDUCATION</div></div>
<div class="hdiv"></div>
<div class="ht">
<svg width="30" height="36" viewBox="0 0 32 38" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M19.5 2L6 21h9.5l-2.5 15L27 16H17L19.5 2z" fill="#f59c36" stroke="#e08a20" stroke-width=".6" stroke-linejoin="round"/></svg>
<div><h1><input class="he" value="${D.groupName}" placeholder="Group Name" onblur="D.groupName=this.value.trim();sv()"></h1>
<div class="ht-sub">ADEA Leadership Institute Class of <input class="he" value="${D.classYear}" placeholder="Year" onblur="D.classYear=this.value.trim();sv()" style="width:70px"> / Interview Manager</div></div>
</div></div>
<div class="hdr-r"><div class="ch u">Plan Due: April 11</div><div class="ch i">Summary: July 10</div></div></div>`;

  // People grid: mentor first, then fellows
  h+='<div class="people">';
  // Mentor card
  const mOpen=OC['m'];
  h+=`<div class="p-card mentor${mOpen?' open':''}" onclick="TG('m')">
<div class="p-label">Mentor <span class="p-toggle">${mOpen?'close':'expand'}</span></div>
<div class="p-name" contenteditable="true" onclick="event.stopPropagation()" onblur="D.mentor.n=this.textContent.trim();sv()">${m.n||'(click to add)'}</div>
<div class="p-inst" contenteditable="true" onclick="event.stopPropagation()" onblur="D.mentor.t=this.textContent.trim();sv()">${m.t||''}</div>
<div class="p-detail" onclick="event.stopPropagation()">
<div class="pf-label">Email</div><input class="pf email" value="${m.e||''}" placeholder="email@university.edu" onblur="D.mentor.e=this.value.trim();sv()">
<div class="pf-label">Phone</div><input class="pf" value="${m.p||''}" placeholder="Phone number" onblur="D.mentor.p=this.value.trim();sv()">
</div></div>`;

  D.fellows.forEach((f,i)=>{
    const isOpen=OC[i];
    h+=`<div class="p-card${isOpen?' open':''}" onclick="TG(${i})">
<div class="p-label">Fellow ${i+1} <span style="margin-left:auto;display:flex;align-items:center;gap:8px"><span class="p-toggle">${isOpen?'close':'expand'}</span>${D.fellows.length>2?`<button class="p-remove" onclick="event.stopPropagation();rmF(${i})" title="Remove" style="position:static;opacity:.35;font-size:11px">&#215;</button>`:''}</span></div>
<div class="p-name" contenteditable="true" onclick="event.stopPropagation()" data-i="${i}" data-f="n" onblur="uf(this)">${f.n}</div>
<div class="p-inst" contenteditable="true" onclick="event.stopPropagation()" data-i="${i}" data-f="i" onblur="uf(this)">${f.i}</div>
<div class="p-detail" onclick="event.stopPropagation()">
<div class="pf-label">Short Name (table headers)</div><input class="pf" value="${f.s}" data-i="${i}" style="font-weight:700" onblur="ufS(this)">
<div class="pf-label">Email</div><input class="pf email" value="${f.e||''}" data-i="${i}" data-f="e" placeholder="email@university.edu" onblur="uf(this)">
<div class="pf-label">Phone</div><input class="pf" value="${f.p||''}" data-i="${i}" data-f="p" placeholder="Phone number" onblur="uf(this)">
</div></div>`;
  });
  h+=`<div class="add-card" onclick="addF()">+ Add Fellow</div>`;
  h+='</div>';

  h+=`<div class="tabs">
<div class="tab active" onclick="P('stk',this)">Stakeholders</div>
<div class="tab" onclick="P('qst',this)">Interview Questions</div>
<div class="tab" onclick="P('rol',this)">Team Roles</div>
<div class="tab" onclick="P('tln',this)">Timeline</div></div>
<div id="stk" class="pn active"></div><div id="qst" class="pn"></div><div id="rol" class="pn"></div><div id="tln" class="pn"></div>`;

  h+=`<div class="foot">
<p>Compile all data into a summary email to fellows and mentor.</p>
<button class="submit-btn" onclick="sendEmail()">Email Summary to the Group</button>
<button class="reset-btn" onclick="resetAll()">Reset All Data</button></div>`;

  document.getElementById('root').innerHTML=h;V.stk();
}

function TG(k){OC[k]=!OC[k];render()}
function uf(el){const i=+el.dataset.i,f=el.dataset.f;D.fellows[i][f]=(el.tagName==='INPUT'?el.value:el.textContent).trim();sv()}
function ufS(el){const i=+el.dataset.i,old=D.fellows[i].s,nw=el.value.trim()||('Inst'+(i+1));D.fellows[i].s=nw;['parent','community'].forEach(sec=>{D.stk[sec].forEach(row=>{if(row.e[old]!==undefined&&old!==nw){row.e[nw]=row.e[old];delete row.e[old]}if(!row.e[nw])row.e[nw]={n:'',t:'',s:'tbd'}})});sv();render()}
function addF(){const idx=D.fellows.length+1;const f={n:'Fellow '+idx,i:'Institution '+idx,s:'Inst'+idx,e:'',p:''};D.fellows.push(f);['parent','community'].forEach(sec=>{D.stk[sec].forEach(row=>{row.e[f.s]={n:'',t:'',s:'tbd'}})});OC[D.fellows.length-1]=true;sv();render()}
function rmF(i){if(D.fellows.length<=2){alert('Minimum 2 fellows.');return}if(!confirm('Remove '+D.fellows[i].n+'?'))return;const s=D.fellows[i].s;D.fellows.splice(i,1);['parent','community'].forEach(sec=>{D.stk[sec].forEach(row=>{delete row.e[s]})});OC={};sv();render()}
function resetAll(){if(!confirm('Erase ALL data and start fresh?'))return;localStorage.removeItem(SK);D=defaultData();OC={};render()}

function P(id,el){document.querySelectorAll('.pn').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');el.classList.add('active');V[id]()}
const V={};

V.stk=function(){const el=document.getElementById('stk');
let h='<div class="sd">Click any cell to edit. Click status badges to cycle: Confirmed, Pending, TBD.</div>';
h+='<div class="lg"><div class="li"><div class="ldd" style="background:var(--green)"></div>Confirmed</div><div class="li"><div class="ldd" style="background:var(--orange)"></div>Pending</div><div class="li"><div class="ldd" style="background:var(--red)"></div>TBD</div></div>';
h+='<div class="inst-key">';D.fellows.forEach((f,i)=>{if(i>0)h+=' &nbsp;/&nbsp; ';h+=`<strong>${f.s}</strong> = ${f.i||'(none)'}`});h+='</div>';
h+='<div class="sst">Parent Institution</div>'+bT(D.stk.parent,'parent');
h+='<div class="sst">Community / State</div>'+bT(D.stk.community,'community');
el.innerHTML=h;aH()};
function bT(rows,sec){const sh=D.fellows.map(f=>f.s);let t='<div class="sw"><table class="st"><colgroup><col style="width:28px"><col class="pos">';for(let i=0;i<sh.length;i++)t+='<col class="inst">';t+='</colgroup><tr><th>#</th><th>Position</th>';sh.forEach(s=>t+='<th>'+s+'</th>');t+='</tr>';
rows.forEach((r,ri)=>{t+='<tr><td class="num-cell">'+(ri+1)+'</td><td class="sp" contenteditable="true" onblur="D.stk.'+sec+'['+ri+'].p=this.textContent.trim();sv()">'+r.p+'</td>';
sh.forEach(k=>{const e=(r.e&&r.e[k])||{n:'',t:'',s:'tbd'};t+=`<td><span class="sn" contenteditable="true" data-a="${sec}" data-r="${ri}" data-k="${k}" data-f="n">${e.n||'(click to add)'}</span><span class="tt" contenteditable="true" data-a="${sec}" data-r="${ri}" data-k="${k}" data-f="t">${e.t||''}</span><span class="ss ${e.s||'tbd'}" data-a="${sec}" data-r="${ri}" data-k="${k}">${e.s||'tbd'}</span></td>`});t+='</tr>'});
t+='<tr><td colspan="'+(sh.length+2)+'" style="text-align:center;padding:6px"><button class="add-stk" onclick="addStk(\''+sec+'\')">+ Add position</button></td></tr>';
return t+'</table></div>'}
function aH(){document.querySelectorAll('.ss').forEach(el=>{el.addEventListener('click',function(){const{a,r,k}=this.dataset;const st=['confirmed','pending','tbd'];const c=D.stk[a][+r].e[k].s||'tbd';const nx=st[(st.indexOf(c)+1)%3];D.stk[a][+r].e[k].s=nx;this.className='ss '+nx;this.textContent=nx;sv()})});
document.querySelectorAll('table.st [contenteditable][data-f]').forEach(el=>{el.addEventListener('blur',function(){const{a,r,k,f}=this.dataset;if(!a)return;if(!D.stk[a][+r].e[k])D.stk[a][+r].e[k]={n:'',t:'',s:'tbd'};const v=this.textContent.trim();D.stk[a][+r].e[k][f]=(v==='(click to add)')?'':v;sv()});el.addEventListener('focus',function(){if(this.textContent.trim()==='(click to add)')this.textContent=''})})}

function addStk(sec){
  const name=prompt('Position name:');if(!name)return;
  const e={};D.fellows.forEach(f=>{e[f.s]={n:'',t:'',s:'tbd'}});
  D.stk[sec].push({p:name,e:e});sv();V.stk();
}

V.qst=function(){const el=document.getElementById('qst');const roles=Object.keys(D.q);if(!window._qR)window._qR=roles[0];
let h='<div class="sd">Select a role. Core (teal) = shared. Specific (green) = unique per role. Click text to edit.</div>';
h+='<div class="lg"><div class="li"><div class="ldd" style="background:var(--teal)"></div>Core</div><div class="li"><div class="ldd" style="background:var(--green)"></div>Specific</div></div>';
h+='<div class="qrs">';roles.forEach(r=>{h+=`<div class="qrb${r===window._qR?' a':''}" onclick="sR('${r}')">${r}</div>`});h+='</div>';
const q=D.q[window._qR];let n=1;q.c.forEach((x,i)=>{h+=qC(n++,x,'core','c',i)});q.s.forEach((x,i)=>{h+=qC(n++,x,'spec','s',i)});
h+='<button class="aq" onclick="aQ()">+ Add question</button>';el.innerHTML=h};
function sR(r){window._qR=r;V.qst()}
function qC(n,txt,cls,key,idx){return`<div class="qc"><div class="qn ${cls}">${n}</div><div class="qt" contenteditable="true" data-k="${key}" data-i="${idx}" onblur="uQ(this)">${txt}</div><span class="qtg ${cls}">${cls==='core'?'core':'specific'}</span><div class="qa"><button class="qb" onclick="mQ('${key}',${idx},-1)">&#8593;</button><button class="qb" onclick="mQ('${key}',${idx},1)">&#8595;</button><button class="qb del" onclick="dQ('${key}',${idx})">&#215;</button></div></div>`}
function uQ(el){D.q[window._qR][el.dataset.k][+el.dataset.i]=el.textContent.trim();sv()}
function mQ(k,i,d){const a=D.q[window._qR][k];const n=+i+d;if(n<0||n>=a.length)return;[a[+i],a[n]]=[a[n],a[+i]];sv();V.qst()}
function dQ(k,i){D.q[window._qR][k].splice(+i,1);sv();V.qst()}
function aQ(){const k=prompt('Type: c (core) or s (specific)?','s');if(k!=='c'&&k!=='s')return;D.q[window._qR][k].push('New question...');sv();V.qst()}

V.rol=function(){const el=document.getElementById('rol');
const roles=[{k:'analyst',t:'Analyst',d:'Collects and analyzes interview data from all fellows. Identifies patterns across institutions.'},{k:'convener',t:'Convener',d:'Project manager. Tracks deadlines, sends reminders, schedules calls.'},{k:'writer',t:'Writer (Summary of Findings)',d:'Lead author on the Summary of Findings. Cannot be the position paper lead writer.'},{k:'other',t:'Other Roles',d:'Editor, reviewer, data visualizer, or other roles as the group determines.'}];
let h='<div class="sd">Click a fellow to assign. For "Other Roles," a text field appears for responsibilities.</div>';
roles.forEach(r=>{h+=`<div class="rc"><h3>${r.t}</h3><p>${r.d}</p><div class="ra">`;
D.fellows.forEach((f,fi)=>{const key=r.k+'_'+fi;const isSel=D.ra[key]!==undefined;
h+=`<div class="fc-row"><div class="fc${isSel?' sel':''}" onclick="tR('${r.k}',${fi})">${f.n} (${f.s})</div>`;
if(isSel&&r.k==='other'){h+=`<input class="role-input" type="text" placeholder="Describe role..." value="${(D.ra[key]||'').replace(/"/g,'&quot;')}" onblur="uR('${r.k}',${fi},this.value)">`}
h+='</div>'});h+='</div></div>'});el.innerHTML=h};
function tR(k,fi){const key=k+'_'+fi;if(D.ra[key]!==undefined)delete D.ra[key];else D.ra[key]='';sv();V.rol()}
function uR(k,fi,val){D.ra[k+'_'+fi]=val;sv()}

V.tln=function(){const el=document.getElementById('tln');
let h='<div class="sd">Click circles to check off items. Saves automatically.</div>';
D.cl.forEach((item,i)=>{h+=`<div class="ti"><div class="tc${item.x?' done':''}" onclick="tC(${i})">${item.x?'&#10003;':''}</div><div class="tdd">${item.d}</div><div class="tk"><strong>${item.t}</strong></div></div>`});
el.innerHTML=h};
function tC(i){D.cl[i].x=!D.cl[i].x;sv();V.tln()}

function sendEmail(){
  const emails=D.fellows.map(f=>f.e).filter(Boolean);
  if(D.mentor.e)emails.push(D.mentor.e);
  if(!emails.length){alert('No emails found. Expand cards above to add emails.');return}
  let b=D.groupName+' / ADEA LI Class of '+D.classYear+'\n\nINTERVIEW PLAN SUMMARY\n\nFELLOWS:\n';
  D.fellows.forEach(f=>{b+=f.n+' - '+f.i+(f.e?' ('+f.e+')':'')+'\n'});
  b+='\nMENTOR: '+D.mentor.n+(D.mentor.t?', '+D.mentor.t:'')+(D.mentor.e?' ('+D.mentor.e+')':'')+'\n';
  b+='\nSTAKEHOLDERS:\n';
  ['parent','community'].forEach(sec=>{b+='\n'+sec.toUpperCase()+':\n';D.stk[sec].forEach(r=>{b+=r.p+':\n';D.fellows.forEach(f=>{const e=r.e[f.s];if(e&&e.n)b+='  '+f.s+': '+e.n+' - '+e.t+' ('+e.s+')\n'})})});
  b+='\nQUESTIONS:\n';
  Object.keys(D.q).forEach(role=>{b+='\n'+role+':\n';let n=1;D.q[role].c.forEach(q=>{b+=n+++'. [Core] '+q+'\n'});D.q[role].s.forEach(q=>{b+=n+++'. [Specific] '+q+'\n'})});
  window.location.href='mailto:'+emails.join(',')+
    '?subject='+encodeURIComponent(D.groupName+' - ADEA LI Interview Plan Summary')+'&body='+encodeURIComponent(b);
  // Show fallback modal
  setTimeout(()=>{showFallback(emails.join(', '),D.groupName+' - ADEA LI Interview Plan Summary',b)},500);
}

function showFallback(to,subject,body){
  const overlay=document.createElement('div');
  overlay.id='fb-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML=`<div style="background:#fff;border-radius:10px;max-width:640px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 30px rgba(0,0,0,.2)">
<div style="padding:16px 20px;border-bottom:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center">
<div><div style="font-size:14px;font-weight:700;color:#1a2a30">Email not opening?</div>
<div style="font-size:11px;color:#7a8e96;margin-top:2px">Copy the content below and paste into your email client.</div></div>
<button onclick="document.getElementById('fb-overlay').remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#8a949a;padding:4px">&#215;</button></div>
<div style="padding:14px 20px;overflow-y:auto;flex:1">
<div style="margin-bottom:8px"><span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#8a949a">To</span>
<div id="fb-to" style="font-size:11px;color:#197589;font-weight:600;padding:4px 0;user-select:all">${to}</div></div>
<div style="margin-bottom:8px"><span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#8a949a">Subject</span>
<div id="fb-subj" style="font-size:11px;font-weight:600;padding:4px 0;user-select:all">${subject}</div></div>
<div><span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#8a949a">Body</span>
<pre id="fb-body" style="font-size:10px;line-height:1.5;color:#1a2a30;white-space:pre-wrap;word-break:break-word;padding:8px 0;font-family:inherit;margin:0;user-select:all;max-height:40vh;overflow-y:auto">${body.replace(/</g,'&lt;')}</pre></div></div>
<div style="padding:12px 20px;border-top:1px solid #e0e0e0;display:flex;gap:8px;justify-content:flex-end">
<button onclick="copyFB('fb-to')" style="padding:7px 16px;border-radius:6px;border:1px solid #d4d9dd;background:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:#526068">Copy To</button>
<button onclick="copyFB('fb-body')" style="padding:7px 16px;border-radius:6px;border:none;background:#197589;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">Copy Body</button>
</div></div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove()});
}

function copyFB(id){
  const el=document.getElementById(id);
  const text=el.textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=event.target;const orig=btn.textContent;
    btn.textContent='Copied!';btn.style.background='#588234';btn.style.color='#fff';btn.style.borderColor='#588234';
    setTimeout(()=>{btn.textContent=orig;btn.style.background='';btn.style.color='';btn.style.borderColor=''},1500);
  }).catch(()=>{
    const range=document.createRange();range.selectNodeContents(el);
    const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
    document.execCommand('copy');sel.removeAllRanges();
  });
}

render();
</script>
</body>
</html>
